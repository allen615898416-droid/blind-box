<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ShakeSecret · Blind Box</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
:root{--ink:#5C4B51;--gold:#D4AF37;--cream:#FFF8F0;--warm:#E8D4C4;--accent:#7A5230;--shadow:rgba(92,75,81,.15)}
html,body{height:100%}
body{font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;background:#1a1614;color:var(--ink);
  display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}

/* 画布 402×874 (iPhone 17 Pro @3x) */
#app{position:relative;width:402px;height:874px;overflow:hidden;border-radius:48px;box-shadow:0 0 0 8px #111;
  transform-origin:center center;flex:none;background:var(--cream)}
/* 灵动岛 */
#app::before{content:"";position:absolute;top:10px;left:50%;transform:translateX(-50%);width:126px;height:36px;
  background:#111;border-radius:20px;z-index:200;pointer-events:none}
/* Home indicator */
#app::after{content:"";position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;
  background:rgba(0,0,0,.15);border-radius:3px;z-index:200;pointer-events:none}

.screen{position:absolute;inset:0;display:none;flex-direction:column;
  background-size:100% 100%;background-position:center top}
.screen.on{display:flex}

/* 通用按钮 */
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.btn{background:linear-gradient(180deg,#FFE28A,#F5BF3A);border:2.5px solid #E8A725;border-radius:28px;
  color:var(--accent);font-weight:900;display:flex;align-items:center;justify-content:center;gap:6px;
  box-shadow:0 4px 0 #D49520,inset 0 2px 4px rgba(255,255,255,.55);transition:transform .08s,box-shadow .08s;
  letter-spacing:.5px;text-shadow:0 1px 0 rgba(255,255,255,.4)}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 #D49520,inset 0 2px 4px rgba(255,255,255,.55)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn.ghost{background:linear-gradient(180deg,#FFF8EE,#F3E4CC);border-color:#DFC9A8;color:var(--ink);
  box-shadow:0 4px 0 #D4BC96,inset 0 2px 4px rgba(255,255,255,.6);text-shadow:none}
.btn img.ic{width:26px;height:26px;object-fit:contain}

/* 返回按钮 */
.backbtn{position:absolute;left:14px;top:50px;width:38px;height:38px;border-radius:50%;z-index:30;
  background:rgba(255,255,255,.8);border:1.5px solid var(--warm);font-size:20px;font-weight:800;color:var(--ink);
  display:flex;align-items:center;justify-content:center;line-height:1;box-shadow:0 2px 6px var(--shadow)}
.backbtn:active{transform:scale(.9)}

/* ========== P1 首页 ========== */
#p1{padding:40px 20px 36px;align-items:center;justify-content:center;gap:0;overflow:hidden}
.p1-logo{width:88%;aspect-ratio:2.3/1;object-fit:cover;object-position:center 48%;flex:none}
.p1-hero{flex:none;position:relative;width:100%;display:flex;align-items:center;justify-content:center;margin-top:14px}
.p1-heroImg{width:auto;max-width:72%;max-height:300px;height:auto;object-fit:contain;filter:drop-shadow(0 14px 24px rgba(140,110,70,.18));transition:opacity .18s,transform .18s}
.p1-arrow{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.7);border:1.5px solid var(--warm);display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:800;color:var(--accent);cursor:pointer;z-index:2;transition:transform .1s;
  box-shadow:0 2px 6px rgba(140,110,70,.12);-webkit-user-select:none;user-select:none}
.p1-arrow:active{transform:translateY(-50%) scale(.9)}
.p1-arrow.left{left:0}.p1-arrow.right{right:0}
.p1-dots{flex:none;display:flex;gap:6px;justify-content:center;margin-top:6px}
.p1-dot{width:8px;height:8px;border-radius:50%;background:rgba(176,146,104,.3);transition:background .2s}
.p1-dot.act{background:var(--accent)}
.p1-name{flex:none;margin-top:8px;padding:7px 36px;border-radius:16px;
  background:rgba(255,255,255,.55);border:1.5px dashed rgba(176,146,104,.55);
  font-size:16px;font-weight:900;color:var(--accent);letter-spacing:1px;text-align:center;
  box-shadow:0 2px 5px rgba(140,110,70,.1)}
.p1-start{width:82%;height:62px;font-size:30px;letter-spacing:2px;flex:none;margin-top:16px;border-radius:32px}
.p1-start .st{font-size:17px;color:#fff;opacity:.85;margin:0 5px;text-shadow:none}
.p1-coll{width:72%;height:46px;font-size:17px;flex:none;margin-top:12px;border-radius:24px;gap:8px}

/* ========== P2 收集墙 ========== */
#p2{padding:110px 16px 44px}
.tabs{display:flex;gap:7px;flex:none;padding-bottom:4px;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;width:64px;border-radius:15px;background:rgba(255,255,255,.55);border:1.5px solid rgba(200,170,120,.25);
  padding:8px 2px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:.15s}
.tab.act{background:linear-gradient(180deg,#FFEFC2,#F5DC93);border-color:#E5BE66;box-shadow:0 2px 4px rgba(229,190,102,.3)}
.tab img{width:28px;height:28px;object-fit:contain}
.tab .tn{font-size:7.5px;font-weight:800;color:#8A7256;text-align:center;line-height:1.15}
.tab.act .tn{color:var(--accent)}
.series-row{display:flex;align-items:center;justify-content:center;gap:10px;margin:12px 0 10px;flex:none}
.series-row h2{font-size:18px;font-weight:900;letter-spacing:2px;color:var(--accent)}
.eye{width:38px;height:32px;background:rgba(255,255,255,.7);border:1.5px solid #E6D2AE;border-radius:12px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none}
.eye img{width:20px;height:20px;object-fit:contain}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;flex:none;align-content:start;overflow-y:auto;padding-bottom:4px}
.grid::-webkit-scrollbar{display:none}
.cell{aspect-ratio:720/912;background-size:100% 100%;position:relative;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:10%;
  border:2px solid transparent;border-radius:12px}
.cell .cimg{width:80%;height:62%;object-fit:contain}
.cell .nm{font-size:11px;font-weight:800;color:var(--accent);margin-top:4px;text-align:center}
.cell.uncollected{cursor:pointer;justify-content:center;padding-top:0}
.cell.collected{justify-content:center;padding-top:0}
.cell .qmark{font-size:46px;font-weight:900;color:rgba(150,134,103,.35);line-height:1}
.coming{grid-column:1/4;height:260px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;
  color:#B6A48F;font-weight:800;border:1.5px dashed #D9C7B2;border-radius:14px;background:rgba(255,255,255,.4);font-size:16px}
.coming span{font-size:11px;font-weight:400}
.p2-bottom{display:flex;gap:8px;align-items:center;flex:none;margin-top:10px}
.progress{width:calc((100% - 20px)*2/3 + 10px);height:44px;border-radius:22px;background:rgba(255,255,255,.85);border:1.5px solid #E6D2AE;
  display:flex;align-items:center;justify-content:center;gap:8px;font-weight:800;position:relative;overflow:hidden;color:var(--accent)}
.progress .fill{position:absolute;left:0;top:0;bottom:0;background:rgba(212,175,55,.25);border-radius:22px}
.progress span{position:relative;z-index:1}
.progress .pct{font-size:18px;font-weight:900;line-height:1}
.progress .lbl{font-size:9px;font-weight:800;letter-spacing:1px;color:#9B8467;line-height:1}
.share-btn{width:calc((100% - 20px)/3);height:44px;font-size:12px;border-radius:18px;flex-direction:column;gap:2px}
.share-btn .ic{width:18px;height:18px}

/* ========== P3 游戏页 ========== */
#p3{padding:110px 16px 60px;align-items:center;justify-content:flex-start;gap:0}
.find-bar{display:flex;align-items:center;justify-content:center;gap:10px;height:52px;border-radius:18px;width:100%;
  background:rgba(255,255,255,.75);border:1.5px solid #E6D2AE;font-weight:900;font-size:18px;flex:none;color:var(--accent)}
.find-bar #findLabel{font-size:18px;letter-spacing:1px}
.find-bar .fimg{width:38px;height:38px;object-fit:contain}
.find-bar #findName{font-size:16px;font-weight:800;color:#9B8467}
.find-bar.hidden-on{border-color:var(--gold);background:#FDF7E6;color:#B8860B}
.p3-stage{flex:1;min-height:0;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:0}
.carousel{position:relative;width:370px;height:360px;overflow:hidden;margin-top:auto;margin-bottom:auto}
.box{display:flex;align-items:center;justify-content:center;cursor:pointer;position:absolute;top:0;
  transition:transform .38s cubic-bezier(.22,1,.36,1),opacity .38s ease,left .38s cubic-bezier(.22,1,.36,1)}
.box .bimg{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 8px 12px rgba(140,110,70,.18))}
/* slot positions computed by JS */
.box.center.selected .bimg{filter:drop-shadow(0 0 8px rgba(229,158,43,.8)) drop-shadow(0 8px 12px rgba(140,110,70,.2))}
.box.shaking{animation-name:shk;animation-timing-function:cubic-bezier(.36,.07,.19,.97);animation-iteration-count:infinite}
@keyframes shk{0%,100%{transform:translate(0,0) rotate(0)}
  15%{transform:translate(calc(var(--ax,6px)*-1),calc(var(--ay,3px)*-1)) rotate(calc(var(--rot,3deg)*-1))}
  30%{transform:translate(var(--ax,6px),calc(var(--ay,3px)*.3)) rotate(var(--rot,3deg))}
  45%{transform:translate(calc(var(--ax,6px)*-.6),calc(var(--ay,3px)*-.4)) rotate(calc(var(--rot,3deg)*-.5))}
  60%{transform:translate(calc(var(--ax,6px)*.4),0) rotate(calc(var(--rot,3deg)*.3))}
  80%{transform:translate(calc(var(--ax,6px)*-.2),0) rotate(calc(var(--rot,3deg)*-.15))}}
.shake-btn{height:40px;width:70%;font-size:16px;letter-spacing:1px;margin-top:14px;flex:none;border-radius:20px;gap:8px;
  background:rgba(255,248,240,.9);border:1.5px solid #E5BE66;color:var(--accent);
  box-shadow:none;text-shadow:none;font-weight:800}
.shake-btn:active{transform:scale(.96);box-shadow:none}
.shake-btn .sicon{width:22px;height:22px;border-radius:50%;background:rgba(229,190,102,.35);display:inline-flex;
  align-items:center;justify-content:center;font-size:12px;color:var(--accent)}
.shake-btn .x{font-size:13px;opacity:.6;font-weight:700}
.cand-row{display:flex;gap:7px;justify-content:center;flex:none;margin-top:20px;width:92%}
.cand{flex:1;max-width:72px;border-radius:14px;background:rgba(255,255,255,.85);border:1.5px solid #ECDCC6;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:7px 2px;transition:.1s}
.cand .cimg{width:63px;height:63px;object-fit:contain}
.cand .nm{font-size:8px;font-weight:800;text-align:center;color:var(--accent);line-height:1.1}
.cand.sel{border-color:#E5A020;box-shadow:0 0 0 2px rgba(229,158,43,.4),0 4px 8px rgba(229,158,43,.25);
  transform:translateY(-3px);background:rgba(255,243,210,.9)}
.pick-btn{height:56px;width:90%;font-size:22px;flex:none;margin-top:10px;border-radius:28px;gap:12px}
.pick-btn .st{font-size:16px;color:#fff;opacity:.85;margin:0 4px}

/* ========== P4 结果页 ========== */
#p4{padding:50px 24px 30px;justify-content:center;align-items:center;gap:0}
.res-banner{padding:11px 30px;border-radius:16px;font-weight:900;font-size:19px;text-align:center;color:var(--accent);
  background:linear-gradient(180deg,#FFE7A6,#F0C55C);border:2.5px solid #DCA63A;flex:none;
  box-shadow:0 4px 0 #CC9430,inset 0 1px 2px rgba(255,255,255,.5);letter-spacing:.5px}
.res-banner.gold{background:linear-gradient(180deg,#FFE9A0,#E0B43A);border-color:#C9962A}
.res-fx{position:relative;width:280px;height:248px;display:flex;align-items:center;justify-content:center;margin:14px 0 4px;flex:none;overflow:hidden;border-radius:50%}
.res-fx .ray{position:absolute;width:280px;height:280px;object-fit:contain;animation:spin 8s linear infinite;opacity:.7}
@keyframes spin{to{transform:rotate(360deg)}}
.res-fx .conf{position:absolute;width:280px;height:280px;object-fit:contain;pointer-events:none}
.res-fx .obox{position:absolute;bottom:0;width:140px;height:140px;object-fit:contain;z-index:1}
.res-fx .rchar{width:176px;height:176px;object-fit:contain;position:relative;z-index:2;margin-bottom:50px;
  filter:drop-shadow(0 8px 10px rgba(140,110,70,.2));animation:pop .45s cubic-bezier(.2,1.3,.5,1)}
.res-fx .rem{font-size:88px;position:relative;z-index:2;animation:pop .45s cubic-bezier(.2,1.3,.5,1)}
@keyframes pop{0%{transform:scale(.2);opacity:0}100%{transform:scale(1);opacity:1}}
.res-card{width:150px;aspect-ratio:720/912;background-size:100% 100%;position:relative;margin-top:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:14%;flex:none}
.res-card .badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%) rotate(-8deg);
  background:linear-gradient(180deg,#FF8FA3,#F26485);color:#fff;font-size:12px;font-weight:900;letter-spacing:1px;
  padding:4px 12px;border-radius:12px;border:2px solid #fff;box-shadow:0 2px 6px rgba(242,100,133,.4);z-index:3;display:none}
.res-card.is-new .badge{display:block}
.res-card .cimg{width:62%;height:55%;object-fit:contain}
.res-card .nm{position:absolute;bottom:10%;left:0;right:0;text-align:center;font-size:13px;font-weight:900;color:var(--accent)}
.res-sub{font-size:12px;color:#9B8467;margin-top:8px;font-weight:800;letter-spacing:.5px}
#btnContinue{width:78%;height:54px;font-size:19px;margin-top:18px;border-radius:28px}
#btnPlayAgain{width:62%;height:42px;font-size:14px;margin-top:8px;border-radius:22px}

/* 模态 */
.modal{position:absolute;inset:0;background:rgba(20,15,12,.65);display:none;align-items:center;justify-content:center;padding:30px;z-index:50}
.modal.on{display:flex}
.modal .box2{background:var(--cream);border-radius:18px;padding:20px;text-align:center;display:flex;flex-direction:column;gap:10px;width:100%}
.modal h3{font-size:16px;color:var(--accent)}.modal p{font-size:12px;color:#8a7866;line-height:1.5}
.modal .row{display:flex;gap:8px}.modal .row .btn{flex:1;height:44px;font-size:13px}
/* 全家福蒙层 */
#familyModal{z-index:55}
.family-box{background:var(--cream);border-radius:20px;padding:16px;position:relative;width:92%;max-width:370px}
.family-close{position:absolute;top:8px;right:8px;width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.8);border:1.5px solid var(--warm);font-size:18px;
  display:flex;align-items:center;justify-content:center;color:var(--ink)}
.family-box h3{font-size:17px;font-weight:900;letter-spacing:2px;color:var(--accent);margin-bottom:10px;text-align:center}
.family-box img{width:100%;height:auto;border-radius:12px;display:block}

.toast{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:8px 16px;border-radius:18px;font-size:11px;font-weight:700;opacity:0;transition:.2s;pointer-events:none;z-index:99;white-space:nowrap}
.toast.on{opacity:.9}
</style>
</head>
<body>
<div id="app">

  <!-- P1 首页 -->
  <section id="p1" class="screen on">
    <img class="p1-logo" id="p1Logo" alt="ShakeSecret">
    <div class="p1-hero" id="p1HeroWrap">
      <div class="p1-arrow left hide" id="arrL" onclick="slideChar(-1)">‹</div>
      <img class="p1-heroImg" id="p1Hero" alt="hero">
      <div class="p1-arrow right" id="arrR" onclick="slideChar(1)">›</div>
    </div>
    <div class="p1-dots" id="p1Dots"></div>
    <div class="p1-name" id="p1Name">Pip</div>
    <button class="btn p1-start" id="btnStart2"><span class="st">★</span>START<span class="st">★</span></button>
    <button class="btn ghost p1-coll" id="btnColl2">🎁 Collection ›</button>
  </section>

  <!-- P2 收集墙 -->
  <section id="p2" class="screen">
    <button class="backbtn" id="btnHome">‹</button>
    <div class="tabs" id="tabs"></div>
    <div class="series-row">
      <h2 id="seriesName">✦ COZY FRIENDS ✦</h2>
      <div class="eye" id="btnPreview"><img id="eyeIcon" alt=""></div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="p2-bottom">
      <div class="progress"><div class="fill" id="progFill"></div><span><span class="pct" id="progPct">0%</span> <span class="lbl">COLLECTED</span></span></div>
      <button class="btn ghost share-btn" onclick="toast('Share (demo)')"><img class="ic" id="shareIc" alt="">SHARE</button>
    </div>
  </section>

  <!-- P3 核心游戏页 -->
  <section id="p3" class="screen">
    <button class="backbtn" id="btnBackWall">‹</button>
    <div class="find-bar" id="findBar">
      <span id="findLabel">find:</span><img class="fimg" id="findImg" alt=""><b id="findName">Pip</b>
    </div>
    <div class="p3-stage">
      <div class="carousel" id="carousel"></div>
      <button class="btn shake-btn" id="btnShake"><span class="sicon">✦</span>SHAKE <span class="x" id="shakeX">×10</span></button>
    </div>
    <div class="cand-row" id="candRow"></div>
    <button class="btn pick-btn" id="btnPick"><span class="st">★</span>Pick it<span class="st">★</span></button>
  </section>

  <!-- P4 结果页 -->
  <section id="p4" class="screen">
    <div class="res-banner" id="resBanner">Got New Character!</div>
    <div class="res-fx" id="resFx">
      <img class="ray" id="resRay" alt="">
      <img class="conf" id="resConf" alt="">
      <img class="obox" id="resBox" alt="">
      <div id="resCharWrap" style="display:flex;align-items:center;justify-content:center;position:relative;z-index:2"></div>
    </div>
    <div class="res-card" id="resCard">
      <span class="badge">NEW</span>
      <img class="cimg" id="resCardImg" alt="">
      <div class="nm" id="resName">Pip</div>
    </div>
    <div class="res-sub" id="resSub">NEW!</div>
    <button class="btn" id="btnContinue">Continue</button>
    <button class="btn ghost" id="btnPlayAgain" style="display:none">Play Again</button>
  </section>

  <!-- 模态 -->
  <div class="modal" id="modal">
    <div class="box2">
      <h3 id="modalTitle">Out of shakes</h3>
      <p id="modalBody">Watch a short ad to get more.</p>
      <div class="row">
        <button class="btn ghost" id="modalNo">Later</button>
        <button class="btn" id="modalYes">▶ Watch Ad</button>
      </div>
    </div>
  </div>
  <!-- 全家福蒙层 -->
  <div class="modal" id="familyModal">
    <div class="family-box">
      <button class="family-close" id="familyClose">✕</button>
      <h3 id="familyTitle">COZY FRIENDS</h3>
      <img id="familyImg" alt="">
    </div>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script src="audio-data.js"></script>
<script>
const IMG='art/picture_clean/';
const CONFIG={boxesMain:3,probesMain:10,adProbes:3,hiddenChance:0.05,hiddenPityRounds:20,hiddenTelegraph:false,dailyQuota:8,quotaCap:12,spreadMain:0.85,clarityMain:0.88};
const GENE_CENTER={pitch:0,speed:1.0,eqLow:-2,eqHigh:0,reverb:0.12,volume:0.55};
const CHARS=[
  {id:'pip',    name:'Pip',        gene:{source:1,pitch:4, speed:1.30,eqLow:4, eqHigh:2, reverb:0.35,volume:0.90}},
  {id:'mochi',  name:'Mochi',      gene:{source:0,pitch:-2,speed:0.85,eqLow:-4,eqHigh:-2,reverb:0.05,volume:0.40}},
  {id:'biscuit',name:'Biscuit',    gene:{source:0,pitch:-4,speed:0.70,eqLow:-8,eqHigh:-6,reverb:0.00,volume:0.20}},
  {id:'lumi',   name:'Lumi',       gene:{source:1,pitch:5, speed:1.35,eqLow:3, eqHigh:4, reverb:0.40,volume:0.85}},
  {id:'creme',  name:'Crème Puff', gene:{source:2,pitch:2, speed:1.00,eqLow:-2,eqHigh:4, reverb:0.10,volume:0.70}},
  {id:'daisy',  name:'Daisy',      gene:{source:0,pitch:-1,speed:0.85,eqLow:0, eqHigh:3, reverb:0.08,volume:0.55}},
  {id:'hugo',   name:'Hugo',       gene:{source:2,pitch:-3,speed:0.80,eqLow:2, eqHigh:-3,reverb:0.20,volume:0.60}},
  {id:'rex',    name:'Rex',        gene:{source:2,pitch:1, speed:0.95,eqLow:-1,eqHigh:2, reverb:0.12,volume:0.65}},
];
const HIDDEN={id:'mystery',name:'???',hidden:true,gene:{source:1,pitch:6,speed:1.20,eqLow:2,eqHigh:5,reverb:0.45,volume:0.95}};

const SAVE_KEY='shakesecret_demo_v1';
let S=loadState();
function loadState(){try{const s=JSON.parse(localStorage.getItem(SAVE_KEY));if(s)return s;}catch(e){}return{collected:[],quota:CONFIG.dailyQuota,hiddenStreak:0};}
function saveState(){localStorage.setItem(SAVE_KEY,JSON.stringify(S));}
function isCollected(id){return S.collected.includes(id);}

/* ===== 音频引擎 ===== */
let audioCtx=null,audioBuffers=[null,null,null],hitTimes=[[],[],[]];
const HAS_V=!!navigator.vibrate;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;}
async function loadAudio(){if(!window.SFX)return;const ctx=getAC();for(let i=0;i<3;i++){try{const r=await fetch(window.SFX.clean[i]);const b=await r.arrayBuffer();audioBuffers[i]=await ctx.decodeAudioData(b);hitTimes[i]=detectOnsets(audioBuffers[i]);}catch(e){}}}
function detectOnsets(buf){const d=buf.getChannelData(0),sr=buf.sampleRate,win=Math.round(sr*0.02),hop=Math.round(win/2),rms=[];for(let i=0;i<d.length-win;i+=hop){let s=0;for(let j=0;j<win;j++)s+=d[i+j]*d[i+j];rms.push(Math.sqrt(s/win));}const mx=Math.max(...rms),th=mx*0.25,on=[];let last=-0.05;for(let i=0;i<rms.length;i++){const t=i*hop/sr;if(rms[i]>th&&t-last>0.05){on.push(t);last=t;}}return on;}
function createReverbIR(ctx,dur,decay){const len=Math.max(1,Math.round(ctx.sampleRate*dur)),buf=ctx.createBuffer(1,len,ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);return buf;}
function applySpread(g){const f=CONFIG.spreadMain;return{source:g.source,pitch:GENE_CENTER.pitch+(g.pitch-GENE_CENTER.pitch)*f,speed:GENE_CENTER.speed+(g.speed-GENE_CENTER.speed)*f,eqLow:GENE_CENTER.eqLow+(g.eqLow-GENE_CENTER.eqLow)*f,eqHigh:GENE_CENTER.eqHigh+(g.eqHigh-GENE_CENTER.eqHigh)*f,reverb:GENE_CENTER.reverb+(g.reverb-GENE_CENTER.reverb)*f,volume:GENE_CENTER.volume+(g.volume-GENE_CENTER.volume)*f};}
function applyClarity(g){const n=(1-CONFIG.clarityMain)*0.3,j=v=>v+(Math.random()*2-1)*n;return{...g,pitch:j(g.pitch),speed:Math.max(0.5,Math.min(1.5,g.speed+(Math.random()*2-1)*n*0.15)),volume:Math.max(0.05,Math.min(1,g.volume+(Math.random()*2-1)*n*0.15)),eqLow:g.eqLow+(Math.random()*2-1)*n*4,eqHigh:g.eqHigh+(Math.random()*2-1)*n*4,reverb:Math.max(0,Math.min(0.6,g.reverb+(Math.random()*2-1)*n*0.1))};}
function shakeBox(gene,visEl){
  const g=applyClarity(applySpread(gene)),ctx=getAC(),buf=audioBuffers[g.source];let duration=0.8;
  if(buf){const t0=ctx.currentTime+0.03,src=ctx.createBufferSource();src.buffer=buf;src.playbackRate.value=Math.max(0.3,g.speed*Math.pow(2,g.pitch/12));
    const gain=ctx.createGain(),vol=Math.max(0.05,Math.min(1,g.volume));gain.gain.setValueAtTime(vol*2.1,t0);
    const lo=ctx.createBiquadFilter();lo.type='lowshelf';lo.frequency.value=400;lo.gain.value=g.eqLow;
    const hi=ctx.createBiquadFilter();hi.type='highshelf';hi.frequency.value=3000;hi.gain.value=g.eqHigh;
    const dry=ctx.createGain(),wet=ctx.createGain();dry.gain.value=1;wet.gain.value=Math.max(0,Math.min(0.6,g.reverb));
    const conv=ctx.createConvolver();conv.buffer=createReverbIR(ctx,0.3+g.reverb*0.8,2.5);
    src.connect(lo);lo.connect(hi);hi.connect(dry);hi.connect(conv);conv.connect(wet);dry.connect(gain);wet.connect(gain);gain.connect(ctx.destination);
    src.start(t0);duration=buf.duration/src.playbackRate.value;src.stop(t0+duration+0.1);
    if(HAS_V){const pat=[];let last=0;hitTimes[g.source].map(t=>t/src.playbackRate.value).forEach(t=>{pat.push(Math.max(0,Math.round((t-last)*1000)),Math.round(18+Math.max(-4,Math.min(6,-g.pitch))*6+vol*20));last=t;});if(g.reverb>0.2)pat.push(80,15);navigator.vibrate(pat);}}
  const fill=Math.max(0,Math.min(1,1-g.volume*(0.5+g.speed*0.3))),loose=Math.max(0,Math.min(1,g.reverb*0.7+(g.eqLow/12)*0.3)),space=1-fill;
  visEl.style.setProperty('--ax',(2+space*10+loose*6).toFixed(1)+'px');
  visEl.style.setProperty('--ay',(fill<0.4?(1-fill)*8*0.7:2).toFixed(1)+'px');
  visEl.style.setProperty('--rot',(1+space*6+loose*3).toFixed(1)+'deg');
  visEl.style.animationDuration=(0.6-space*0.18-loose*0.08).toFixed(2)+'s';
  visEl.classList.add('shaking');setTimeout(()=>visEl.classList.remove('shaking'),duration*1000+100);
}

/* ===== 导航 ===== */
const _origShow=function(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');};
function show(id){_origShow(id);playBGM({p1:'collection',p2:'collection',p3:null,p4:null}[id]||null);}
let activeSeries='cozy';

/* ===== BGM 系统 ===== */
const BGM_FILES={collection:'bgm/collection_Fluffing_a_Duck.mp3',game:'bgm/shake_explore_Itty_Bitty_8_Bit.mp3'};
const BGM_VOL={collection:.35,game:.18};
let _bgmEl=null,_bgmScene=null;
function playBGM(scene){
  if(_bgmScene===scene)return;_bgmScene=scene;
  if(!scene){stopBGM();return;}
  const vol=BGM_VOL[scene]||.3;
  if(_bgmEl){
    const old=_bgmEl;let v=old.volume;
    const fi=setInterval(()=>{v=Math.max(0,v-.06);old.volume=v;if(v<=0){clearInterval(fi);old.pause();old.currentTime=0;}},40);
  }
  const a=new Audio(BGM_FILES[scene]);a.loop=true;a.volume=0;
  a.play().catch(()=>{});_bgmEl=a;
  let v2=0;const fo=setInterval(()=>{v2=Math.min(vol,v2+.06);a.volume=v2;if(v2>=vol)clearInterval(fo);},40);
}
function stopBGM(){if(_bgmEl){_bgmEl.pause();_bgmEl.currentTime=0;_bgmEl=null;_bgmScene=null;}}

/* ===== P2 收集墙 ===== */
function renderTabs(){const el=document.getElementById('tabs');el.innerHTML='';SERIES.forEach(s=>{
  const t=document.createElement('div');t.className='tab'+(s.id===activeSeries?' act':'');
  const two=s.name.split(' ');
  t.innerHTML=`<img src="${IMG}${s.icon}"><div class="tn">${two[0]}<br>${two[1]||''}</div>`;
  t.onclick=()=>{activeSeries=s.id;renderWall();};el.appendChild(t);});}
function renderWall(){
  renderTabs();
  const ser=SERIES.find(s=>s.id===activeSeries);
  document.getElementById('seriesName').textContent='✦ '+ser.name+' ✦';
  const grid=document.getElementById('grid');grid.innerHTML='';
  if(!ser.playable){grid.innerHTML='<div class="coming">Coming Soon<span>该系列后续上新</span></div>';document.getElementById('progPct').textContent='—';document.getElementById('progFill').style.width='0%';return;}
  CHARS.forEach(c=>{
    const got=isCollected(c.id),cell=document.createElement('div');
    if(got){cell.className='cell collected';cell.style.backgroundImage=`url('${IMG}slot_uncollected.png')`;
      cell.innerHTML=`<img class="cimg" src="${IMG}char_${c.id}_card.png"><span class="nm">${c.name}</span>`;
      cell.onclick=()=>toast(c.name+' — collected');}
    else{cell.className='cell uncollected';cell.style.backgroundImage=`url('${IMG}slot_uncollected.png')`;
      cell.innerHTML=`<span class="qmark">?</span>`;
      cell.onclick=()=>startRound(c.id);}
    grid.appendChild(cell);
  });
  const got=isCollected(HIDDEN.id),h=document.createElement('div');h.className='cell';
  if(got){h.style.backgroundImage=`url('${IMG}slot_uncollected.png')`;h.innerHTML=`<img class="cimg" src="${IMG}char_mystery_card.png"><span class="nm">HIDDEN</span>`;}
  else h.style.backgroundImage=`url('${IMG}slot_hidden.png')`;
  grid.appendChild(h);
  const total=CHARS.length+1,owned=CHARS.filter(c=>isCollected(c.id)).length+(got?1:0),pct=Math.round(owned/total*100);
  document.getElementById('progPct').textContent=pct+'%';document.getElementById('progFill').style.width=pct+'%';
  updateQuota();
}

/* ===== 开局 ===== */
function startRound(targetId){
  const N=CONFIG.boxesMain,pool=CHARS.map(c=>c.id).filter(id=>id!==targetId);shuffle(pool);
  let picks=[targetId,...pool.slice(0,N-1)],hiddenIn=false;
  const pity=S.hiddenStreak>=CONFIG.hiddenPityRounds;
  if(!isCollected(HIDDEN.id)&&(Math.random()<CONFIG.hiddenChance||pity)){hiddenIn=true;picks[1+Math.floor(Math.random()*(N-1))]=HIDDEN.id;}
  S.hiddenStreak=hiddenIn?0:S.hiddenStreak+1;saveState();shuffle(picks);
  round={targetId,boxes:picks,selected:Math.floor(N/2),probes:CONFIG.probesMain,hiddenIn};
  renderGame();show('p3');
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

/* ===== P3 游戏页 ===== */
let _carouselReady=false;
function renderGame(){
  const tgt=CHAR_MAP[round.targetId];
  document.getElementById('findLabel').textContent=(round.hiddenIn&&CONFIG.hiddenTelegraph)?'⚡ Hidden! find:':'find:';
  document.getElementById('findImg').src=IMG+'char_'+tgt.id+'_thumb.png';
  document.getElementById('findName').textContent=isCollected(tgt.id)?'(1/1)':'(0/1)';
  document.getElementById('findBar').classList.toggle('hidden-on',round.hiddenIn&&CONFIG.hiddenTelegraph);
  buildCarousel();
  const cr=document.getElementById('candRow');cr.innerHTML='';
  [...round.boxes].sort().forEach(cid=>{
    const c=CHAR_MAP[cid],el=document.createElement('div');el.className='cand';
    el.innerHTML=`<img class="cimg" src="${IMG}char_${c.id}_thumb.png"><span class="nm">${c.hidden?'???':c.name}</span>`;
    cr.appendChild(el);
  });
  document.getElementById('shakeX').textContent='×'+round.probes;
  document.getElementById('btnShake').disabled=false;
  updateQuota();
}
function buildCarousel(){
  const car=document.getElementById('carousel');car.innerHTML='';
  const CW=370,CH=360,CW2=CW/2,cW=234,cH=360,sW=120,sH=225,sTop=(CH-sH)/2;
  const sL=-sW+105,sR=CW-105;
  round.boxes.forEach((cid,i)=>{
    const b=document.createElement('div');
    b.className='box'+(i===round.selected?' center selected':'');
    b.dataset.idx=i;b.style.transition='none';
    const adj=Math.abs(i-round.selected);
    if(i===round.selected){
      b.style.width=cW+'px';b.style.height=cH+'px';
      b.style.left=(CW2-cW/2)+'px';b.style.top='0';
      b.style.opacity='1';b.style.transform='';
    }else if(adj===1){
      b.style.width=sW+'px';b.style.height=sH+'px';
      b.style.left=(i<round.selected?sL:sR)+'px';b.style.top=sTop+'px';
      b.style.opacity='.45';b.style.transform='perspective(500px) rotateY('+(i<round.selected?'16':'-16')+'deg)';
      b.style.cursor='pointer';
    }else{
      b.style.width=sW+'px';b.style.height=sH+'px';
      b.style.left=(i<round.selected?-200:CW+100)+'px';b.style.top=sTop+'px';
      b.style.opacity='0';b.style.pointerEvents='none';
    }
    b.innerHTML=`<img class="bimg" src="${IMG}box_center.png" alt="box">`;
    b.onclick=(ev)=>{ev.stopPropagation();if(Math.abs(i-round.selected)===1)carouselGoTo(i);};
    car.appendChild(b);
  });
}
let _animating=false;
function carouselGoTo(newIdx){
  if(_animating||newIdx===round.selected||newIdx<0||newIdx>=round.boxes.length)return;
  _animating=true;round.selected=newIdx;
  const boxes=document.querySelectorAll('#carousel .box');
  const CW=370,CH=360,CW2=CW/2,cW=234,cH=360,sW=120,sH=225,sTop=(CH-sH)/2,sL=-sW+105,sR=CW-105;
  const dur='.38s cubic-bezier(.22,1,.36,1)';
  boxes.forEach(b=>{
    const i=+b.dataset.idx,adj=Math.abs(i-newIdx);
    b.classList.toggle('center',i===newIdx);b.classList.toggle('selected',i===newIdx);
    b.style.transition=`transform ${dur},opacity ${dur},left ${dur},width ${dur},height ${dur},top ${dur}`;
    if(i===newIdx){b.style.width=cW+'px';b.style.height=cH+'px';b.style.left=(CW2-cW/2)+'px';b.style.top=(CH-cH)/2+'px';b.style.opacity='1';b.style.transform='';b.style.pointerEvents='auto';}
    else if(adj===1){
      b.style.width=sW+'px';b.style.height=sH+'px';
      b.style.left=(i<newIdx?sL:sR)+'px';b.style.top=sTop+'px';
      b.style.opacity='.45';b.style.transform='perspective(500px) rotateY('+(i<newIdx?'16':'-16')+'deg)';
      b.style.cursor='pointer';b.style.pointerEvents='auto';
    }else{
      b.style.width=sW+'px';b.style.height=sH+'px';
      b.style.left=(i<newIdx?-200:CW+100)+'px';b.style.top=sTop+'px';
      b.style.opacity='0';b.style.pointerEvents='none';
    }
  });
  setTimeout(()=>{_animating=false;boxes.forEach(b=>b.style.transition='');},420);
}
function doShake(){
  if(round.probes<=0){openModal('Out of shakes','Watch a short ad for +'+CONFIG.adProbes+' shakes.',()=>{round.probes+=CONFIG.adProbes;renderGame();toast('+'+CONFIG.adProbes+' shakes');});return;}
  round.probes--;document.getElementById('shakeX').textContent='×'+round.probes;
  const visEl=document.querySelectorAll('#carousel .box')[round.selected];
  shakeBox(CHAR_MAP[round.boxes[round.selected]].gene,visEl);
}
function doPick(){
  if(S.quota<=0){openModal('Shop sold out','Daily stock empty. Watch an ad for +1 box.',()=>{S.quota++;saveState();updateQuota();toast('+1 box');});return;}
  S.quota--;saveState();
  setTimeout(()=>showResult(round.boxes[round.selected]),600);
}

/* ===== P4 结果页 ===== */
function showResult(openedId){
  const opened=CHAR_MAP[openedId],isTarget=openedId===round.targetId,isHidden=!!opened.hidden,wasNew=!isCollected(openedId);
  collect(openedId);
  const banner=document.getElementById('resBanner');banner.classList.toggle('gold',isHidden);
  banner.textContent=isHidden?'Hidden Edition Unlocked!':isTarget?'Hit Target!':wasNew?'Got New Character!':'Got Duplicate';
  document.getElementById('resRay').src=IMG+'fx_light_ray.png';
  document.getElementById('resBox').src=IMG+'box_open.png';
  const wrap=document.getElementById('resCharWrap');
  wrap.innerHTML=isHidden?'<span class="rem">✨</span>':`<img class="rchar" src="${IMG}char_${openedId}_full.png">`;
  const conf=document.getElementById('resConf');conf.style.display=(isHidden||isTarget)?'block':'none';
  if(isHidden||isTarget)conf.src=IMG+'fx_confetti.png';
  document.getElementById('resCard').style.backgroundImage=`url('${IMG}card_result.png')`;
  document.getElementById('resCardImg').src=isHidden?IMG+'char_mystery_thumb.png':IMG+'char_'+openedId+'_thumb.png';
  document.getElementById('resName').textContent=isHidden?'Hidden':opened.name;
  document.getElementById('resCard').classList.toggle('is-new',wasNew||isHidden);
  document.getElementById('resSub').textContent=isHidden?'★ Secret':(wasNew?'NEW!':'Already owned');
  try{const ctx=getAC();fetch(window.SFX.single[opened.gene.source]).then(r=>r.arrayBuffer()).then(b=>ctx.decodeAudioData(b)).then(buf=>{const s=ctx.createBufferSource();s.buffer=buf;s.connect(ctx.destination);s.start();});}catch(e){}
  if(HAS_V)navigator.vibrate(isHidden?[40,30,40,30,80]:[30]);
  const again=document.getElementById('btnPlayAgain'),cont=document.getElementById('btnContinue');
  if(isTarget){again.style.display='none';cont.textContent='Continue';}else{again.style.display='flex';cont.textContent='Back to Wall';}
  show('p4');
}
